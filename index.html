<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Coach – Dein intelligenter Trainingspartner</title>
    <meta name="description"
        content="KI-gesteuerter Hybrid-Trainingsplan für Laufen, Gym und mehr. Erstelle deinen personalisierten Plan.">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>try { tailwind.config = { darkMode: 'class' }; } catch (e) { }</script>

    <style>
        html,
        body {
            overscroll-behavior: none;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .dark body {
            background-color: #020617;
            color: #f1f5f9;
        }

        #antigravity-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.5s;
        }

        .dark #antigravity-canvas {
            opacity: 0.25;
        }

        .gradient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .gradient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: blobFloat 20s ease-in-out infinite alternate;
        }

        .dark .gradient-blob {
            opacity: 0.25;
        }

        .gradient-blob:nth-child(1) {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #93c5fd, #c4b5fd);
            top: -10%;
            left: -8%;
            animation-duration: 22s;
        }

        .gradient-blob:nth-child(2) {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, #a5b4fc, #f9a8d4);
            bottom: 5%;
            right: -10%;
            animation-duration: 26s;
            animation-delay: -8s;
        }

        .gradient-blob:nth-child(3) {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, #c4b5fd, #ddd6fe);
            top: 35%;
            left: 25%;
            animation-duration: 30s;
            animation-delay: -14s;
        }

        .dark .gradient-blob:nth-child(1) {
            background: radial-gradient(circle, #1e3a5f, #312e81);
        }

        .dark .gradient-blob:nth-child(2) {
            background: radial-gradient(circle, #4c1d95, #7c3aed40);
        }

        .dark .gradient-blob:nth-child(3) {
            background: radial-gradient(circle, #581c87, #312e81);
        }

        @keyframes blobFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(5vw, -4vh) scale(1.08);
            }

            66% {
                transform: translate(-3vw, 6vh) scale(0.95);
            }

            100% {
                transform: translate(2vw, -2vh) scale(1.03);
            }
        }

        #app {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 120px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        #modal-content {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            overflow: hidden;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .dark #modal-content {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
        }

        #modal-body {
            overflow-y: auto;
            padding: 20px;
        }

        #onboarding-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .chart-group:hover .tooltip {
            opacity: 1 !important;
        }

        .chart-group .tooltip.opacity-100 {
            opacity: 1 !important;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            width: 20px;
            height: 20px;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #error-msg {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a;
            color: white;
            z-index: 999;
            padding: 40px;
            text-align: center;
        }

        .reverse {
            unicode-bidi: bidi-override;
            direction: rtl;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <div class="gradient-bg">
        <div class="gradient-blob"></div>
        <div class="gradient-blob"></div>
        <div class="gradient-blob"></div>
    </div>
    <canvas id="antigravity-canvas"></canvas>

    <input type="file" id="import-input" style="display:none" onchange="window.importData(this)">

    <div id="error-msg">
        <h1 class="text-2xl font-bold mb-4">Ups!</h1>
        <button onclick="localStorage.clear(); location.reload()"
            class="bg-red-500 text-white px-6 py-3 rounded-xl font-bold">App Reset</button>
    </div>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" style="display:none"
        class="fixed inset-0 z-[1000] flex flex-col items-center justify-center">
        <!-- THEME TOGGLE FOR SPLASH -->
        <button onclick="window.toggleTheme()"
            class="absolute top-6 right-6 flex items-center gap-2 px-4 py-3 bg-slate-200/60 dark:bg-slate-800/80 backdrop-blur-md rounded-2xl z-[1010] shadow-md hover:scale-105 transition-transform">
            <span id="splash-theme-icon" class="w-5 h-5">🌓</span>
            <span class="text-xs font-bold opacity-70 dark:text-slate-300">Theme</span>
        </button>
        <div class="text-center fade-in relative z-10">
            <div class="text-6xl font-black mb-2 tracking-tight">
                <span
                    class="bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 bg-clip-text text-transparent">Hybrid</span>
            </div>
            <div class="text-5xl font-black tracking-tight dark:text-white">
                Trainer
            </div>
            <p class="mt-4 text-sm opacity-50 dark:text-slate-400 font-medium">Dein intelligenter Trainingspartner</p>
            <button onclick="window.startOnboarding()"
                class="mt-10 px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-2xl font-bold text-lg shadow-xl shadow-blue-500/25 transition-all active:scale-95">Get
                Started →</button>
        </div>
    </div>

    <!-- ONBOARDING (Multi-Step) -->
    <div id="onboarding-overlay" style="display:none" class="fixed inset-0 z-[999] overflow-y-auto">
        <div class="max-w-[420px] mx-auto w-full p-6 pt-12 fade-in relative z-10">
            <div id="ob-steps" class="flex gap-2 mb-8"></div>
            <div id="ob-content"></div>
        </div>
    </div>

    <div id="app"></div>

    <footer class="fixed bottom-0 left-0 right-0 p-4 pb-8 flex justify-center gap-6 z-10 pointer-events-none">
        <button onclick="window.openLegal('impressum')"
            class="pointer-events-auto text-[10px] font-bold opacity-30 hover:opacity-100 transition-opacity uppercase tracking-widest dark:text-slate-400">Impressum</button>
        <button onclick="window.openLegal('privacy')"
            class="pointer-events-auto text-[10px] font-bold opacity-30 hover:opacity-100 transition-opacity uppercase tracking-widest dark:text-slate-400">Datenschutz</button>
    </footer>

    <div id="modal-overlay" onclick="window.closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div class="p-4 bg-slate-900 text-white flex justify-between items-center shadow-md">
                <h3 id="modal-title" class="font-bold text-lg">Details</h3>
                <button onclick="window.closeModal()"
                    class="text-2xl leading-none opacity-80 hover:opacity-100">&times;</button>
            </div>
            <div id="modal-body"></div>
            <div id="modal-footer" class="p-4 border-t dark:border-slate-800 bg-slate-50 dark:bg-slate-900"></div>
        </div>
    </div>

    <script>window.onerror = function () { document.getElementById('error-msg').style.display = 'block'; };</script>

    <!-- Module (Reihenfolge beachten: Abhängigkeiten zuerst) -->
    <script src="js/state.js"></script>
    <script src="js/data.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/plan.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/onboarding.js"></script>
    <script src="js/actions.js"></script>
    <script src="js/ui.js"></script>
</body>

</html>
